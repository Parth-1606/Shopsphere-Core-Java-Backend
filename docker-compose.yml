version: '3.8'

services:
  postgres:
    image: postgres:16.3
    container_name: shopsphere-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: shopsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shopsphere-network
    restart: unless-stopped

  redis:
    image: redis:7.2.4-alpine
    container_name: shopsphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - shopsphere-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  shopsphere-network:
    driver: bridge
