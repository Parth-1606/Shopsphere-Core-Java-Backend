spring:
  datasource:
    # File-based H2 so products, users, and orders survive app restarts
    url: jdbc:h2:file:./data/shopsphere;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.parth.shopsphere: DEBUG
